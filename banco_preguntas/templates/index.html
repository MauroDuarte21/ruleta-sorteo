<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Banco de Preguntas del Curso</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color:#f2f4f8;
    margin:0;
    padding:0;
}

.container{
    width:80%;
    max-width:900px;
    margin:auto;
    margin-top:40px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#2c3e50;
}

h2{
    color:#34495e;
}

label{
    font-weight:bold;
}

input, textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
}

textarea{
    height:90px;
    resize:vertical;
}

button{
    background-color:#3498db;
    color:white;
    border:none;
    padding:12px 20px;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background-color:#2980b9;
}

.card{
    background:#ecf0f1;
    padding:15px;
    border-radius:8px;
    margin-bottom:15px;
}

.nombre{
    color:#2c3e50;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>📚 Banco de Preguntas del Curso</h1>

<form method="POST">

<label>Nombre del estudiante</label>
<input type="text" name="nombre" required>

<label>Pregunta 1</label>
<textarea name="p1" required></textarea>

<label>Respuesta 1</label>
<textarea name="r1" required></textarea>

<label>Pregunta 2</label>
<textarea name="p2" required></textarea>

<label>Respuesta 2</label>
<textarea name="r2" required></textarea>

<button type="submit">Guardar Preguntas</button>

</form>

<hr>

<h2>Preguntas del curso</h2>

{% for d in data %}

<div class="card">

<p class="nombre">👤 {{d[0]}}</p>

<p><b>Pregunta:</b> {{d[1]}}</p>
<p><b>Respuesta:</b> {{d[2]}}</p>

<p><b>Pregunta:</b> {{d[3]}}</p>
<p><b>Respuesta:</b> {{d[4]}}</p>

</div>

{% endfor %}

</div>

</body>
</html>
